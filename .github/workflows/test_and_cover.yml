name: Test and Cover
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Run tests with coverage
        run: make cover

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: cover_lines.out
          format: golang

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Build
        shell: cmd
        run: .\build_win.bat

      - name: List tunnels
        shell: cmd
        run: .\dist\boring.exe l
        env:
          DEBUG: 1
